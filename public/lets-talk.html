<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Let's Talk | Monu Nayan</title>
    <link rel="stylesheet" href="style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>

<body>
    <header class="header">
        <a href="index.html" class="logo">Monu Nayan.</a>
        <nav class="navbar">
            <a href="index.html" class="active" style="margin-left: 0;">Back to Home</a>
        </nav>
    </header>

    <section class="contact" style="padding-top: 15rem; min-height: 80vh; background: var(--bg-color);">
        <h2 class="heading">Let's <span>Talk</span></h2>

        <div style="text-align: center; margin-bottom: 4rem;">
            <p style="font-size: 1.8rem; color: var(--text-color);">I'm always open to discussing product design work or
                partnership opportunities.</p>
            <div class="home-sci"
                style="position: relative; width: 100%; justify-content: center; gap: 2rem; margin-top: 3rem; bottom: auto;">
                <a href="https://mail.google.com/mail/?view=cm&fs=1&to=monunayan22@gmail.com" target="_blank"
                    title="Email Me in Gmail"><i class='bx bx-envelope'></i></a>
                <a href="https://www.linkedin.com/in/monu-nayan27/" target="_blank" title="LinkedIn"><i
                        class='bx bxl-linkedin'></i></a>
                <a href="https://wa.me/919508052317" target="_blank" title="WhatsApp"><i
                        class='bx bxl-whatsapp'></i></a>
                <a href="https://www.instagram.com/im.mr.nayan?igsh=czFod2lrazJ2bG12" target="_blank"
                    title="Instagram"><i class='bx bxl-instagram'></i></a>
            </div>
        </div>

        <form action="https://formsubmit.co/monunayan22@gmail.com" method="POST" id="contactForm"
            style="max-width: 60rem;">
            <!-- Honey pot field and settings -->
            <input type="hidden" name="_captcha" value="false">
            <input type="hidden" name="_subject" value="New submission from Portfolio!">
            <!-- FormSubmit Auto-Redirect back to the main page -->
            <input type="hidden" name="_next" id="nextUrl" value="" data-next="lets-talk.html">

            <div class="input-box">
                <div class="input-field">
                    <input name="name" id="name" type="text" placeholder="Full Name" required>
                    <span class="focus"></span>
                </div>
                <div class="input-field">
                    <input name="email" id="email" type="email" placeholder="Email Address" required>
                    <span class="focus"></span>
                </div>
            </div>
            <!-- Additional hidden fields to match the email format -->
            <input name="phone" id="phone" type="hidden" value="">
            <input name="subject" id="subject" type="hidden" value="From Let's Talk">
            <div class="textarea-field">
                <textarea name="message" id="message" cols="30" rows="10" placeholder="Tell me about your project..."
                    required></textarea>
                <span class="focus"></span>
            </div>
            <div class="btn-box btns" style="width: 100%; justify-content: center;">
                <button type="submit" class="btn" style="width: 25rem;">Send Message</button>
            </div>
        </form>
        <div id="formMessage" style="color: white; margin-top: 1rem; text-align: center;"></div>
    </section>

    <!-- footer design -->
    <footer class="footer" style="padding: 2rem 9%; justify-content: center;">
        <div class="footer-text">
            <p style="text-align: center;">Copyright &copy; 2025 | Designed and Maintenance by Monu Nayan</p>
        </div>
    </footer>
    <script src="script.js"></script>
</body>
</html>
